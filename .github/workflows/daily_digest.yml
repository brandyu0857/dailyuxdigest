name: Daily UX Digest

on:
  schedule:
    # 8:00 AM EST = 13:00 UTC (year-round, arrives at 9 AM during EDT)
    - cron: '0 13 * * *'
  workflow_dispatch:
    inputs:
      test_email:
        description: 'Send only to this email (leave empty for all subscribers)'
        required: false
        default: ''

permissions:
  contents: write

jobs:
  send-digest:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install --no-cache-dir -r requirements.txt
          pip uninstall -y openai 2>/dev/null || true
          python -c "import anthropic; print('anthropic', anthropic.__version__)"

      - name: Run Daily UX Digest
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GMAIL_ADDRESS: ${{ secrets.GMAIL_ADDRESS }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          GOOGLE_SHEET_ID: ${{ secrets.GOOGLE_SHEET_ID }}
          TEST_EMAIL: ${{ github.event.inputs.test_email }}
        run: python main.py

      - name: Commit dedup history
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/sent_articles.json
          git diff --staged --quiet || git commit -m "Update sent articles history"
          git pull --rebase origin ${{ github.ref_name }}
          git push
