name: Daily UX Digest

on:
  schedule:
    # 8:37 AM EST = 13:37 UTC (off-peak minute to avoid cron congestion)
    - cron: '37 13 * * *'
    # Backup: 3 hours later in case the primary cron is skipped
    - cron: '37 16 * * *'
  workflow_dispatch:
    inputs:
      test_email:
        description: 'Send only to this email (leave empty for all subscribers)'
        required: false
        default: ''

permissions:
  contents: write

jobs:
  send-digest:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install --no-cache-dir -r requirements.txt

      - name: Run Daily UX Digest
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GMAIL_ADDRESS: ${{ secrets.GMAIL_ADDRESS }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          GOOGLE_SHEET_ID: ${{ secrets.GOOGLE_SHEET_ID }}
          TEST_EMAIL: ${{ github.event.inputs.test_email }}
        run: python main.py

      - name: Commit data and archive
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          cp data/sent_articles.json /tmp/sent_articles.json
          cp -f data/send_marker.json /tmp/send_marker.json 2>/dev/null || true
          cp -r docs/data /tmp/docs_data
          git fetch origin ${{ github.ref_name }}
          git reset --hard origin/${{ github.ref_name }}
          cp /tmp/sent_articles.json data/sent_articles.json
          cp -f /tmp/send_marker.json data/send_marker.json 2>/dev/null || true
          cp -r /tmp/docs_data/* docs/data/
          git add data/sent_articles.json data/send_marker.json docs/data/
          git diff --staged --quiet || (git commit -m "Update archive and dedup history" && git push)
